<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>404 - Page Not Found</title>
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#0f172a">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 560px;
      padding: 20px;
    }

    h1 {
      font-size: 72px;
      margin: 0 0 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
      opacity: 0.9;
    }

    .host {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 6px;
      word-break: break-word;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    a:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>404</h1>
    <p>Page not found.</p>
    <p class="host" id="host"></p>

    <a id="homeLink" href="/">Go to homepage</a>
  </div>

  <script>
    document.getElementById("host").textContent =
      "Host: " + window.location.hostname;

    // Optional redirect after 5 seconds
    // setTimeout(() => {
    //   window.location.href = "/";
    // }, 5000);
  </script>
</body>
</html>
